## ============================================================
## Portfolio Backend — config principal
## Las credenciales sensibles (mail user/password) NUNCA van
## hardcoded acá: se inyectan vía variables de entorno.
## En desarrollo local, definilas en Run Configuration de IntelliJ
## o en un .env (NO commiteado).
## ============================================================

spring.application.name=portfolio-backend

# ---- Servidor ----
# Render usa la variable PORT para indicarle a la app a qué puerto bindearse.
server.port=${PORT:8080}

# ---- Mail (Gmail SMTP) ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ---- Configuración propia del Contact Form ----
# Email DESTINO: a dónde se envían los mensajes del form (mi mail).
contact.recipient=${CONTACT_RECIPIENT:lucascamino05@gmail.com}
# Email ORIGEN: con qué cuenta se envían (típicamente la misma que MAIL_USERNAME).
contact.from=${CONTACT_FROM:${MAIL_USERNAME:}}

# ---- CORS ----
# Lista separada por comas de orígenes permitidos. Default cubre Netlify
# preview branches + producción + dev local de Angular.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,https://*.netlify.app}

# ---- Rate limit ----
# 3 requests por IP cada 10 minutos (en milisegundos).
app.ratelimit.window-ms=600000
app.ratelimit.max-requests=3

# ---- Logging ----
logging.level.com.lucascamino.portfolio=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n
