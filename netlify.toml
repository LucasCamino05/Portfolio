# Netlify config — vive en la raíz del repo (Netlify lo busca acá).
# Las rutas `publish` y `command` se resuelven RELATIVAS a `base`.

[build]
  base    = "frontend"
  publish = "dist/frontend/browser"
  command = "npm ci && npm run build"

[build.environment]
  NODE_VERSION = "22"
  NPM_VERSION  = "11"

# SPA fallback: cualquier ruta no encontrada se sirve como index.html
# para que Angular Router resuelva /proyectos/:slug del lado del cliente.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
