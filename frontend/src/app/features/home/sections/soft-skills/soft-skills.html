<app-section
  id="skills"
  titleKey="softSkills.title"
  subtitleKey="softSkills.subtitle"
  eyebrow="02"
>
  <ul class="soft-skills-grid">
    @for (skill of skills; track skill.key) {
      <li class="soft-skills-card">
        <div class="soft-skills-card__icon">
          <lucide-icon [img]="resolveIcon(skill.icon)" [size]="20" />
        </div>
        <h3 class="soft-skills-card__name">
          {{ 'softSkills.items.' + skill.key + '.title' | translate }}
        </h3>
        <p class="soft-skills-card__evidence">
          {{ 'softSkills.items.' + skill.key + '.evidence' | translate }}
        </p>
      </li>
    }
  </ul>
</app-section>
