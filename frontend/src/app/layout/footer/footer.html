<footer class="footer">
  <div class="footer__inner">
    <div class="footer__col footer__col--brand">
      <strong class="footer__name">{{ site.ownerName }}</strong>
      <p class="footer__tagline">{{ 'footer.tagline' | translate }}</p>
    </div>

    <div class="footer__col footer__col--controls">
      <app-language-switcher />
      <app-theme-toggle />
    </div>

    <div class="footer__col">
      <app-footer-social />
    </div>
  </div>

  <div class="footer__rights">
    {{ 'footer.rights' | translate: { year: year } }}
  </div>
</footer>
